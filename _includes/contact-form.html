    <!-- Contact Form Overlay -->
    <div id="form-overlay" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="form-title">
        <form id="contact-form" action="https://formspree.io/f/xdklqqqg" method="POST">
            <button type="button" id="close-form">&times;<span class="visually-hidden" data-lang-key="closeForm">Fechar
                    formulário</span></button>
            <div class="form-content">
                <h2 id="form-title" data-lang-key="formTitle">Contato</h2>
                <div id="form-status" class="form-status" aria-live="polite"></div>
                <label for="name" data-lang-key="formName">Nome:</label>
                <input type="text" id="name" name="name" required aria-required="true" aria-describedby="name-error">
                <div id="name-error" class="error-message" role="alert"></div>
                <label for="email" data-lang-key="formEmail">E-mail:</label>
                <input type="email" id="email" name="email" required aria-required="true"
                    aria-describedby="email-error">
                <div id="email-error" class="error-message" role="alert"></div>
                <label for="message" data-lang-key="formMessage">Mensagem:</label>
                <textarea id="message" name="message" required aria-required="true"
                    aria-describedby="message-error"></textarea>
                <div id="message-error" class="error-message" role="alert"></div>
                <button type="submit" data-lang-key="formSubmit">Enviar</button>
            </div>
        </form>
    </div>
