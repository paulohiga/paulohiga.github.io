{% assign pt_state = 'pt-' | append: page.view %}
{% assign en_state = 'en-' | append: page.view %}
    <nav class="toolbar" aria-label="{% if page.lang == 'en' %}Display options{% else %}Opções de visualização{% endif %}">
        <div class="language-selector">
            <a id="lang-pt" href="{{ site.data.pages[pt_state].url }}" data-nav lang="pt-BR" hreflang="pt-BR" class="{% if page.lang == 'pt' %}active{% endif %}" aria-label="Mudar para Português"{% if page.lang == 'pt' %} aria-current="true"{% endif %}>PT</a>
            <a id="lang-en" href="{{ site.data.pages[en_state].url }}" data-nav lang="en" hreflang="en" class="{% if page.lang == 'en' %}active{% endif %}" aria-label="Switch to English"{% if page.lang == 'en' %} aria-current="true"{% endif %}>EN</a>
        </div>
        <div class="theme-selector">
            <button id="theme-toggle" type="button" aria-label="{% if page.lang == 'en' %}Toggle light/dark theme{% else %}Alternar tema claro/escuro{% endif %}">
                <svg class="ico ico-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
                <svg class="ico ico-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
            </button>
        </div>
    </nav>
