name: Deploy Jekyll site to Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Permissões necessárias para publicar no GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Garante um único deploy concorrente, sem cancelar um em andamento.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Histórico completo: o jekyll-last-modified-at lê a data do último
          # commit que tocou cada arquivo para preencher o <lastmod>.
          fetch-depth: 0
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      # Minifica CSS/JS antes do build: o CSS entra inline no <head> de cada
      # página (via _includes/style.css) e o script.js é servido como arquivo.
      # Roda só na produção; os previews do Netlify usam os fontes legíveis.
      - name: Minify CSS and JS
        run: |
          npx -y lightningcss-cli --minify _includes/style.css -o /tmp/style.min.css
          mv /tmp/style.min.css _includes/style.css
          npx -y terser script.js --compress --mangle -o /tmp/script.min.js
          mv /tmp/script.min.js script.js
      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
